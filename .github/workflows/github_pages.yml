name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths: ["docs/**", "tui/assets/**", ".github/workflows/github_pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - name: Assemble site
        run: |
          mkdir -p docs/assets
          cp tui/assets/demo.gif docs/assets/
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v5
